name: Intel Mac CPU Smoke

on:
  push:
    paths:
      - .github/workflows/intel-mac-cpu-smoke.yml
      - pyproject.toml
      - uv.lock
      - prepare.py
      - train.py
      - tests/test_train_compat.py
  pull_request:
    paths:
      - .github/workflows/intel-mac-cpu-smoke.yml
      - pyproject.toml
      - uv.lock
      - prepare.py
      - train.py
      - tests/test_train_compat.py

permissions:
  contents: read

jobs:
  intel-mac-cpu-smoke:
    name: Intel Mac CPU Smoke (macOS x86_64)
    runs-on: macos-15-intel
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv and Python 3.10
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.10"

      - name: Sync locked dependencies
        run: uv sync --locked

      - name: Run Intel Mac CPU compatibility smoke test
        run: uv run python -m unittest tests.test_train_compat
